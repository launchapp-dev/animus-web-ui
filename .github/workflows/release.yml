name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package dist tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "animus-web-ui-${VERSION}.tar.gz" -C dist .
          sha256sum "animus-web-ui-${VERSION}.tar.gz" > "animus-web-ui-${VERSION}.tar.gz.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            animus-web-ui-*.tar.gz
            animus-web-ui-*.tar.gz.sha256
          generate_release_notes: true
